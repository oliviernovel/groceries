<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista del Mercado</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #f5efe3;
        min-height: 100vh;
        font-family: "Nunito", sans-serif;
      }

      .app {
        max-width: 420px;
        margin: 0 auto;
        min-height: 100vh;
        background: #fdf8ef;
        position: relative;
        box-shadow:
          4px 0 20px rgba(0, 0, 0, 0.08),
          -4px 0 20px rgba(0, 0, 0, 0.08);
      }

      .app::before {
        content: "";
        position: fixed;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 420px;
        height: 100vh;
        background-image: repeating-linear-gradient(
          transparent,
          transparent 31px,
          #e8dfd0 31px,
          #e8dfd0 32px
        );
        background-position: 0 72px;
        pointer-events: none;
        z-index: 0;
        opacity: 0.5;
      }

      /* HEADER */
      .header {
        position: sticky;
        top: 0;
        z-index: 10;
        background: #e8563a;
        padding: 20px 20px 16px;
        box-shadow: 0 2px 12px rgba(232, 86, 58, 0.3);
      }

      .header-title {
        font-family: "Caveat", cursive;
        font-size: 32px;
        font-weight: 700;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      /* ADD BAR */
      .add-bar {
        position: sticky;
        top: 72px;
        z-index: 9;
        padding: 12px 16px;
        background: #fdf8ef;
        border-bottom: 1px solid #e8dfd0;
      }

      .add-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .add-input {
        flex: 1;
        padding: 10px 14px;
        background: #fff;
        border: 2px solid #e8dfd0;
        border-radius: 12px;
        font-family: "Caveat", cursive;
        font-size: 20px;
        color: #3d2b1f;
        outline: none;
      }
      .add-input::placeholder {
        color: #c5b8a8;
      }
      .add-input:focus {
        border-color: #e8563a;
      }

      .add-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #e8563a;
        border: none;
        color: #fff;
        font-size: 22px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .suggestions {
        margin-top: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .suggestions-label {
        width: 100%;
        font-size: 10px;
        font-weight: 700;
        color: #b89880;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }

      .suggestion-chip {
        padding: 4px 10px;
        background: #fff3ee;
        border: 1.5px dashed #e8563a;
        border-radius: 20px;
        font-family: "Caveat", cursive;
        font-size: 16px;
        color: #e8563a;
        cursor: pointer;
      }

      /* SECTION HEADERS */
      .section-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 20px 20px 4px;
        position: relative;
        z-index: 1;
      }

      .section-title {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #b89880;
        font-family: "Nunito", sans-serif;
      }

      .section-count {
        font-size: 10px;
        font-weight: 700;
        color: #d5c8b8;
        font-family: "Nunito", sans-serif;
      }

      .section-line {
        flex: 1;
        height: 1px;
        background: #e8dfd0;
      }

      /* DIVIDER between lists */
      .list-divider {
        height: 8px;
        background: #f0e8d8;
        border-top: 1px solid #e8dfd0;
        border-bottom: 1px solid #e8dfd0;
        position: relative;
        z-index: 1;
      }

      /* Buy items */
      .list-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 20px;
        height: 48px;
        cursor: grab;
        position: relative;
        z-index: 1;
      }

      .drag-handle {
        color: #c5b8a8;
        font-size: 14px;
        flex-shrink: 0;
        opacity: 0.6;
      }

      .item-check {
        width: 22px;
        height: 22px;
        border: 2px solid #d5c8b8;
        border-radius: 6px;
        flex-shrink: 0;
        background: #fff;
        cursor: pointer;
      }

      .item-name {
        flex: 1;
        font-family: "Caveat", cursive;
        font-size: 21px;
        color: #3d2b1f;
      }

      .item-auto-badge {
        font-size: 10px;
        background: #ffd6cc;
        color: #c8442b;
        padding: 1px 6px;
        border-radius: 10px;
        font-weight: 700;
        font-family: "Nunito", sans-serif;
      }

      .item-freq {
        font-size: 11px;
        color: #b89880;
        font-family: "Nunito", sans-serif;
        flex-shrink: 0;
      }

      /* Bought items */
      .bought-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 20px;
        height: 48px;
        position: relative;
        z-index: 1;
      }

      .bought-check {
        width: 22px;
        height: 22px;
        border-radius: 6px;
        background: #e8563a;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .bought-name {
        flex: 1;
        font-family: "Caveat", cursive;
        font-size: 21px;
        color: #8a7060;
      }

      .remove-btn {
        width: 28px;
        height: 28px;
        background: none;
        border: none;
        color: #c5b8a8;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
      }

      .clear-btn {
        margin: 8px 20px 32px;
        padding: 8px 16px;
        background: none;
        border: 1.5px dashed #d5c8b8;
        border-radius: 10px;
        font-size: 12px;
        font-weight: 700;
        font-family: "Nunito", sans-serif;
        color: #b89880;
        cursor: pointer;
        letter-spacing: 0.5px;
        position: relative;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <!-- HEADER -->
      <div class="header">
        <div class="header-title">🛒 Lista del Mercado</div>
      </div>

      <!-- ADD BAR -->
      <div class="add-bar">
        <div class="add-row">
          <input class="add-input" placeholder="Agregar ítem..." />
          <button class="add-btn">+</button>
        </div>
        <div class="suggestions">
          <div class="suggestions-label">Agregar de nuevo →</div>
          <button class="suggestion-chip">Leche</button>
          <button class="suggestion-chip">Pan</button>
          <button class="suggestion-chip">Jabón</button>
        </div>
      </div>

      <!-- POR COMPRAR -->
      <div class="section-header">
        <span class="section-title">Por comprar</span>
        <span class="section-count">6</span>
        <span class="section-line"></span>
      </div>

      <div class="list-item">
        <span class="drag-handle">⠿</span>
        <div class="item-check"></div>
        <span class="item-name">Tomates</span>
        <span class="item-freq">c/5d</span>
      </div>
      <div class="list-item">
        <span class="drag-handle">⠿</span>
        <div class="item-check"></div>
        <span class="item-name">Pechuga de pollo</span>
        <span class="item-freq">c/7d</span>
      </div>
      <div class="list-item">
        <span class="drag-handle">⠿</span>
        <div class="item-check"></div>
        <span class="item-name">Pasta</span>
      </div>
      <div class="list-item">
        <span class="drag-handle">⠿</span>
        <div class="item-check"></div>
        <span class="item-name">Aceite de oliva</span>
        <span class="item-freq">c/14d</span>
      </div>
      <div class="list-item">
        <span class="drag-handle">⠿</span>
        <div class="item-check"></div>
        <span class="item-name">Yogur natural</span>
        <span class="item-auto-badge">auto</span>
        <span class="item-freq">c/3d</span>
      </div>
      <div class="list-item">
        <span class="drag-handle">⠿</span>
        <div class="item-check"></div>
        <span class="item-name">Limones</span>
      </div>

      <!-- DIVIDER -->
      <div class="list-divider"></div>

      <!-- COMPRADO -->
      <div class="section-header">
        <span class="section-title">Comprado</span>
        <span class="section-count">5</span>
        <span class="section-line"></span>
      </div>

      <div class="bought-item">
        <div class="bought-check">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path
              d="M2 6l3 3 5-5"
              stroke="white"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <span class="bought-name">Leche</span>
        <button class="remove-btn">×</button>
      </div>
      <div class="bought-item">
        <div class="bought-check">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path
              d="M2 6l3 3 5-5"
              stroke="white"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <span class="bought-name">Huevos</span>
        <button class="remove-btn">×</button>
      </div>
      <div class="bought-item">
        <div class="bought-check">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path
              d="M2 6l3 3 5-5"
              stroke="white"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <span class="bought-name">Pan</span>
        <button class="remove-btn">×</button>
      </div>
      <div class="bought-item">
        <div class="bought-check">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path
              d="M2 6l3 3 5-5"
              stroke="white"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <span class="bought-name">Mantequilla</span>
        <button class="remove-btn">×</button>
      </div>
      <div class="bought-item">
        <div class="bought-check">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path
              d="M2 6l3 3 5-5"
              stroke="white"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <span class="bought-name">Café molido</span>
        <button class="remove-btn">×</button>
      </div>
    </div>
  </body>
</html>
